---
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # ── Run full CI first ──────────────────────────────────────────────
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  # ── Create GitHub release ──────────────────────────────────────────
  release:
    name: Create Release
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
