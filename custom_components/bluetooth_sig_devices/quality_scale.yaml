# Integration Quality Scale - Bronze Level
# https://developers.home-assistant.io/docs/core/integration-quality-scale/

rules:
  # Bronze - Required for all new integrations
  action-setup:
    status: exempt
    comment: This integration does not provide service actions.
  appropriate-polling:
    status: exempt
    comment: This integration uses local_push (passive Bluetooth scanning), not polling.
  brands:
    status: exempt
    comment: This is a generic Bluetooth integration, not a specific brand/product.
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: This integration does not provide service actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver - Future improvements
  action-exceptions:
    status: exempt
    comment: This integration does not provide service actions.
  config-entry-unloading: done
  docs-configuration-parameters:
    status: done
    comment: Hub entry has poll interval, concurrent connections, connection timeout, probe retries, and stale device timeout options. Device entries have GATT toggle and poll interval override.
  docs-installation-parameters:
    status: exempt
    comment: No installation parameters required.
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates:
    status: exempt
    comment: Uses PassiveBluetoothProcessorCoordinator which handles this.
  reauthentication-flow:
    status: exempt
    comment: This integration does not require authentication.
  test-coverage: todo

  # Gold - Future improvements
  devices: done
  diagnostics: done
  discovery-update-info:
    status: exempt
    comment: Bluetooth discovery info is managed by HA Bluetooth component.
  discovery:
    status: exempt
    comment: Devices are discovered via Bluetooth advertisements, not integration discovery.
  docs-data-update:
    status: done
    comment: Data update behaviour, entity availability, and staleness are documented in docs/explanation/data-paths.md.
  docs-examples:
    status: done
    comment: Automation, dashboard, and statistics examples documented in docs/how-to/examples.md.
  docs-known-limitations:
    status: done
    comment: Known limitations documented in docs/explanation/limitations.md (protocol coverage, read-only, rotating addresses, GATT probe limits).
  docs-supported-devices: done
  docs-supported-functions:
    status: done
    comment: Supported functions table documented in docs/reference/index.md.
  docs-troubleshooting: done
  docs-use-cases:
    status: done
    comment: Use cases documented in docs/index.md (environmental monitoring, health, battery tracking, power monitoring).
  dynamic-devices: done
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations:
    status: done
    comment: Entities with device_class use HA's automatic device-class name translation. Entities without device_class carry names sourced from the Bluetooth SIG GATT specification metadata.
  exception-translations: todo
  icon-translations: todo
  reconfiguration-flow:
    status: done
    comment: Hub entry has options flow for global settings. Device entries have options flow for GATT toggle and poll interval override.
  repair-issues:
    status: exempt
    comment: No user-fixable repair scenarios exist. Bluetooth adapter availability is managed entirely by the HA Bluetooth component.
  stale-devices: done

  # Platinum - Future improvements
  async-dependency: done
  inject-websession:
    status: exempt
    comment: This integration does not make HTTP requests.
  strict-typing:
    status: done
    comment: mypy strict mode is enforced in pyproject.toml and passes with 0 issues across all 14 source files.
