# Integration Quality Scale - Bronze Level
# https://developers.home-assistant.io/docs/core/integration-quality-scale/

rules:
  # Bronze - Required for all new integrations
  action-setup:
    status: exempt
    comment: This integration does not provide service actions.
  appropriate-polling:
    status: exempt
    comment: This integration uses local_push (passive Bluetooth scanning), not polling.
  brands:
    status: exempt
    comment: This is a generic Bluetooth integration, not a specific brand/product.
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: This integration does not provide service actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver - Future improvements
  action-exceptions:
    status: exempt
    comment: This integration does not provide service actions.
  config-entry-unloading: done
  docs-configuration-parameters:
    status: exempt
    comment: Single config entry with no configuration parameters.
  docs-installation-parameters:
    status: exempt
    comment: No installation parameters required.
  entity-unavailable: todo
  integration-owner: done
  log-when-unavailable: todo
  parallel-updates:
    status: exempt
    comment: Uses PassiveBluetoothProcessorCoordinator which handles this.
  reauthentication-flow:
    status: exempt
    comment: This integration does not require authentication.
  test-coverage: todo

  # Gold - Future improvements
  devices: done
  diagnostics: todo
  discovery-update-info:
    status: exempt
    comment: Bluetooth discovery info is managed by HA Bluetooth component.
  discovery:
    status: exempt
    comment: Devices are discovered via Bluetooth advertisements, not integration discovery.
  docs-data-update: todo
  docs-examples: todo
  docs-known-limitations: todo
  docs-supported-devices: done
  docs-supported-functions: todo
  docs-troubleshooting: done
  docs-use-cases: todo
  dynamic-devices: done
  entity-category: todo
  entity-device-class: todo
  entity-disabled-by-default: todo
  entity-translations: todo
  exception-translations: todo
  icon-translations: todo
  reconfiguration-flow:
    status: exempt
    comment: Single config entry with no reconfigurable options.
  repair-issues: todo
  stale-devices: todo

  # Platinum - Future improvements
  async-dependency: done
  inject-websession:
    status: exempt
    comment: This integration does not make HTTP requests.
  strict-typing: todo
